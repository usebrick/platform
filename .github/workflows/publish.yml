name: publish

# Publishes @usebrick/slopbrick to npm when a v* tag is pushed.
#
# Monorepo note: only `packages/slopbrick` is published. `packages/core`
# is private until the schema stabilizes (see packages/core/README.md).
# `packages/{stackpick,gir,mcp}` (future) will get their own publish
# workflows as they ship.
#
# Auth: OIDC trusted publishing with provenance attestation (npm 2024+
# best practice). To configure: npmjs.com → package settings →
# Trusted publishing → add GitHub Actions publisher for repo
# `usebrick/platform`, workflow `.github/workflows/publish.yml`,
# environment `publish`.
#
# To switch to a legacy NPM_TOKEN: set the `NPM_TOKEN` secret in the
# `publish` environment, remove `id-token: write` below, and change
# `npm publish --provenance` to `npm publish` (provenance requires OIDC).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.11.1) — leave empty to use the pushed ref'
        required: false

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # for softprops/action-gh-release
  id-token: write   # for npm OIDC trusted publishing (provenance)

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: publish
      url: https://www.npmjs.com/package/@usebrick/slopbrick
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for provenance + release notes

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches packages/slopbrick version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./packages/slopbrick/package.json').version")"
          if [ -z "$TAG" ]; then
            echo "::error::Could not derive version from ref $GITHUB_REF"
            exit 1
          fi
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag v$TAG does not match packages/slopbrick version $PKG_VERSION"
            echo "::error::Bump packages/slopbrick/package.json to $TAG and re-tag."
            exit 1
          fi
          echo "Releasing @usebrick/slopbrick v$TAG"

      - name: Verify version is not already published
        run: |
          VERSION="$(node -p "require('./packages/slopbrick/package.json').version")"
          if npm view "@usebrick/slopbrick@$VERSION" version >/dev/null 2>&1; then
            echo "::error::Version $VERSION is already on the npm registry. Re-publishing is not allowed."
            exit 1
          fi

      - name: Build core (workspace dep must be built before slopbrick)
        run: pnpm --filter '@usebrick/core' build

      - name: Build slopbrick
        run: pnpm --filter '@usebrick/slopbrick' build

      - name: Run slopbrick quality gates
        working-directory: packages/slopbrick
        run: |
          pnpm typecheck
          pnpm test

      - name: Pack (dry-run) — sanity check the published artifact
        working-directory: packages/slopbrick
        run: npm pack --dry-run

      - name: Publish @usebrick/slopbrick to npm
        working-directory: packages/slopbrick
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true

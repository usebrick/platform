name: publish

# A release event (or an explicitly supplied tag) first creates and verifies
# one immutable package artifact. Only the second job is environment-gated and
# it publishes that uploaded artifact; it never rebuilds from the checkout.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Exact release tag to verify and publish (for example v0.44.0)'
        required: true
        type: string

concurrency:
  group: publish-${{ inputs.tag || github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    name: verify and upload release artifact
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.identity.outputs.tag }}
      version: ${{ steps.identity.outputs.version }}
      artifact_name: ${{ steps.pack.outputs.artifact_name }}
      publish_required: ${{ steps.registry.outputs.publish_required }}
    steps:
      - name: Checkout exact release tag
        # v4.3.1 — pin the reviewed action commit; repository SHA policy is
        # still a remote setting and must be enabled separately.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.event.release.tag_name }}

      - name: Install pnpm
        # v4.3.0 (peeled commit)
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        # Read the exact version from the repository packageManager field.

      - name: Set up Node.js 24
        # v4.4.0
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Resolve release identity
        id: identity
        env:
          RELEASE_TAG: ${{ inputs.tag || github.event.release.tag_name }}
        run: |
          set -euo pipefail
          TAG="${RELEASE_TAG:-}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Expected a semver tag like v0.44.0, got '$TAG'"
            exit 2
          fi
          TAG_COMMIT="$(git rev-parse --verify "refs/tags/$TAG^{commit}" 2>/dev/null || true)"
          HEAD_COMMIT="$(git rev-parse HEAD)"
          if [ -z "$TAG_COMMIT" ] || [ "$TAG_COMMIT" != "$HEAD_COMMIT" ]; then
            echo "::error::Checkout is not the exact commit targeted by tag $TAG"
            echo "::error::tag_commit=${TAG_COMMIT:-unresolved} head_commit=$HEAD_COMMIT"
            exit 1
          fi
          VERSION="${TAG#v}"
          PKG_VERSION="$(node -p "JSON.parse(require('fs').readFileSync('packages/slopbrick/package.json','utf8')).version")"
          if [ "$VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Release tag $TAG does not match packages/slopbrick version $PKG_VERSION"
            exit 1
          fi
          {
            echo "tag=$TAG"
            echo "version=$VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release quality gates
        run: |
          corepack pnpm --workspace-concurrency=1 -r typecheck
          node --test packages/slopbrick/scripts/test-capabilities.test.mjs
          node packages/slopbrick/scripts/test-capabilities.mjs --require-ready
          corepack pnpm --workspace-concurrency=1 -r test
          corepack pnpm --workspace-concurrency=1 -r build
          corepack pnpm --filter slopbrick exec tsx scripts/generate-rule-registry.ts --check
          corepack pnpm --filter slopbrick exec tsx scripts/generate-language-support-matrix.ts --check
          node --test scripts/audit-npm-bulk.test.mjs
          corepack pnpm security:audit

      - name: Determine whether publication is required
        id: registry
        env:
          VERSION: ${{ steps.identity.outputs.version }}
        run: |
          set +e
          NPM_VERSION="$(npm view "slopbrick@$VERSION" version 2>"$RUNNER_TEMP/npm-view.err")"
          STATUS=$?
          set -e
          if [ "$STATUS" -eq 0 ]; then
            if [ "$NPM_VERSION" = "$VERSION" ]; then
              echo "::notice::slopbrick@$VERSION is already published; reruns will verify the artifact and skip npm publish."
              echo "publish_required=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::error::npm returned an unexpected version '$NPM_VERSION' for slopbrick@$VERSION"
            exit 1
          fi
          if ! grep -q 'E404\|E404 Not Found' "$RUNNER_TEMP/npm-view.err"; then
            cat "$RUNNER_TEMP/npm-view.err" >&2
            echo "::error::Could not safely determine whether the version is already published"
            exit 1
          fi
          echo "publish_required=true" >> "$GITHUB_OUTPUT"

      - name: Pack exact release tarball
        id: pack
        working-directory: packages/slopbrick
        env:
          VERSION: ${{ steps.identity.outputs.version }}
        run: |
          set -euo pipefail
          OUT="$RUNNER_TEMP/slopbrick-release"
          mkdir -p "$OUT"
          npm pack --pack-destination "$OUT"
          TARBALL="$(find "$OUT" -maxdepth 1 -type f -name 'slopbrick-*.tgz' -print -quit)"
          [ -n "$TARBALL" ] || { echo '::error::npm pack produced no tarball'; exit 1; }
          TARBALL_NAME="$(basename "$TARBALL")"
          SHA256="$(sha256sum "$TARBALL" | awk '{print $1}')"
          BYTES="$(wc -c < "$TARBALL" | tr -d ' ')"
          SOURCE_COMMIT="$(git rev-parse HEAD)"
          tar -xOf "$TARBALL" package/package.json > "$OUT/package.json"
          node -e 'const p=require(process.argv[1]); if(p.name!=="slopbrick"||p.version!==process.env.VERSION) process.exit(1)' "$OUT/package.json"
          TARBALL_NAME="$TARBALL_NAME" SHA256="$SHA256" BYTES="$BYTES" SOURCE_COMMIT="$SOURCE_COMMIT" node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const out = process.env.RUNNER_TEMP + '/slopbrick-release/release-receipt.json';
          const receipt = {
            schemaVersion: 1,
            package: 'slopbrick',
            version: process.env.VERSION,
            tag: 'v' + process.env.VERSION,
            filename: process.env.TARBALL_NAME,
            sha256: process.env.SHA256,
            bytes: Number(process.env.BYTES),
            sourceCommit: process.env.SOURCE_COMMIT,
          };
          fs.writeFileSync(out, JSON.stringify(receipt, null, 2) + '\n');
          NODE
          TARBALL_NAME="$TARBALL_NAME" SHA256="$SHA256" BYTES="$BYTES" node -e 'if(!/^[a-f0-9]{64}$/.test(process.env.SHA256)||Number(process.env.BYTES)<=0) process.exit(1)'
          {
            echo "artifact_name=slopbrick-release-$VERSION"
            echo "tarball_name=$TARBALL_NAME"
            echo "sha256=$SHA256"
          } >> "$GITHUB_OUTPUT"

      - name: Upload checksum-bound release artifact
        # v4.6.2
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ steps.pack.outputs.artifact_name }}
          path: |
            ${{ runner.temp }}/slopbrick-release/${{ steps.pack.outputs.tarball_name }}
            ${{ runner.temp }}/slopbrick-release/release-receipt.json
          if-no-files-found: error
          retention-days: 14

  publish:
    name: publish verified artifact
    needs: verify
    if: ${{ needs.verify.outputs.publish_required == 'true' }}
    runs-on: ubuntu-latest
    # This is the only environment gate. Verification and artifact creation
    # above remain visible to reviewers before approval is requested.
    environment: publish
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download exact verified artifact
        # v4.3.0
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: ${{ needs.verify.outputs.artifact_name }}
          path: ${{ runner.temp }}/slopbrick-release

      - name: Set up Node.js 24 for npm trusted publishing
        # v4.4.0
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Verify artifact receipt and checksum
        env:
          EXPECTED_TAG: ${{ needs.verify.outputs.tag }}
          EXPECTED_VERSION: ${{ needs.verify.outputs.version }}
        run: |
          set -euo pipefail
          ROOT="$RUNNER_TEMP/slopbrick-release"
          RECEIPT="$ROOT/release-receipt.json"
          [ -f "$RECEIPT" ] || { echo '::error::Release receipt missing from uploaded artifact'; exit 1; }
          TARBALL_NAME="$(node -e 'const r=require(process.argv[1]); process.stdout.write(r.filename)' "$RECEIPT")"
          EXPECTED_SHA="$(node -e 'const r=require(process.argv[1]); process.stdout.write(r.sha256)' "$RECEIPT")"
          EXPECTED_BYTES="$(node -e 'const r=require(process.argv[1]); process.stdout.write(String(r.bytes))' "$RECEIPT")"
          TARBALL="$ROOT/$TARBALL_NAME"
          [ -f "$TARBALL" ] || { echo "::error::Expected tarball $TARBALL_NAME missing"; exit 1; }
          ACTUAL_SHA="$(sha256sum "$TARBALL" | awk '{print $1}')"
          [ "$ACTUAL_SHA" = "$EXPECTED_SHA" ] || { echo "::error::Uploaded tarball checksum mismatch"; exit 1; }
          ACTUAL_BYTES="$(wc -c < "$TARBALL" | tr -d ' ')"
          [ "$ACTUAL_BYTES" = "$EXPECTED_BYTES" ] || { echo "::error::Uploaded tarball size mismatch"; exit 1; }
          node -e 'const r=require(process.argv[1]); if(r.tag!==process.env.EXPECTED_TAG||r.version!==process.env.EXPECTED_VERSION||r.package!=="slopbrick") process.exit(1)' "$RECEIPT"
          tar -xOf "$TARBALL" package/package.json > "$ROOT/package.json"
          node -e 'const p=require(process.argv[1]); if(p.name!=="slopbrick"||p.version!==process.env.EXPECTED_VERSION) process.exit(1)' "$ROOT/package.json"
          echo "Verified $TARBALL_NAME ($ACTUAL_SHA) for $EXPECTED_TAG"

      - name: Recheck registry for idempotent reruns
        env:
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          set +e
          NPM_VERSION="$(npm view "slopbrick@$VERSION" version 2>"$RUNNER_TEMP/npm-view.err")"
          STATUS=$?
          set -e
          if [ "$STATUS" -eq 0 ] && [ "$NPM_VERSION" = "$VERSION" ]; then
            echo "::notice::slopbrick@$VERSION became published while waiting for approval; skipping duplicate publish."
            exit 0
          fi
          if [ "$STATUS" -ne 0 ] && ! grep -q 'E404\|E404 Not Found' "$RUNNER_TEMP/npm-view.err"; then
            cat "$RUNNER_TEMP/npm-view.err" >&2
            exit 1
          fi
          echo "slopbrick@$VERSION is not published; approval may proceed."

      - name: Publish the verified tarball to npm
        env:
          VERSION: ${{ needs.verify.outputs.version }}
        run: npm publish "$RUNNER_TEMP/slopbrick-release/slopbrick-$VERSION.tgz" --provenance --access public

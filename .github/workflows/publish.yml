name: publish

# Publishes `slopbrick` to npm via changesets.
#
# On push to main:
#   1. If there are pending .changeset/*.md files, changesets/action
#      creates (or updates) a "chore: version packages" PR that
#      bumps versions in package.json + writes a CHANGELOG entry
#      per published package. A maintainer reviews and merges that
#      PR â€” that merge IS the human gate for the release.
#   2. When the "chore: version packages" PR is merged,
#      changesets/action runs `pnpm version-packages` (which calls
#      `changeset version` + the website-version sync script) and
#      then `pnpm changeset publish` for each changed package.
#
# Auth: OIDC trusted publishing with provenance attestation (npm 2024+
# best practice). Configure at npmjs.com â†’ package settings â†’
# Trusted publishing â†’ GitHub Actions publisher for repo
# `usebrick/platform`, workflow `.github/workflows/publish.yml`.
# The npm-side config was set up when the first OIDC publish
# shipped; do not reconfigure unless moving to a new repo.
#
# Monorepo note: only `packages/slopbrick` is published today.
# `packages/core` and `packages/engine` are private workspace deps
# (`private: true` in their package.json), so changesets ignores
# them. `packages/website` is ignored explicitly via
# `.changeset/config.json` because it's a deploy-on-merge site with
# no semver.
#
# Why no `workflow_dispatch` trigger: every prior `npm publish` for
# this repo ran via `workflow_dispatch`, which bypassed the git tag
# + GitHub Release gates. The changesets flow makes the version
# bump a regular git commit, so `npm publish` is now structurally
# impossible without a corresponding commit on main.
#
# Why no job-level `environment: publish`: the version-PR merge
# is the human gate. Wrapping the whole job in a GitHub
# Environment would also gate the version-PR creation, which
# means a maintainer has to click "approve" in the GH UI on
# every push to main just to create the PR. The PR itself
# contains the version bump + CHANGELOG, so a reviewer sees
# exactly what is about to publish before clicking merge. If
# the platform ever needs a second gate (e.g. high-severity
# security releases), split this into two workflows:
# `release.yml` (creates the version PR, no env) and `publish.yml`
# (runs after the version PR merges, env-gated).

on:
  push:
    branches: [main]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write        # changesets/action pushes the version PR
  pull-requests: write   # changesets/action opens the version PR
  id-token: write        # npm OIDC trusted publishing (provenance)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for provenance + release notes

      - name: Install pnpm
        # pnpm version comes from the root package.json's
        # `packageManager` field (pnpm@9.15.0). Don't pin a version
        # here â€” pnpm/action-setup errors on the duplicate.
        uses: pnpm/action-setup@v3

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        # Required so `npm publish` (triggered by changesets/action
        # on the version-PR merge) has dist/ artifacts to upload.
        # The slopbrick package.json points `main` and `module` at
        # dist/index.js.
        run: pnpm -r build

      - name: Create or update version PR + publish on merge
        uses: changesets/action@v1
        with:
          # changesets/action needs a token that can open pull
          # requests + push to a branch in this repo. The default
          # `GITHUB_TOKEN` cannot do either in this organization â€”
          # the org setting "Workflow permissions" is at "Read
          # repository contents and packages permissions" (not
          # "Allow GitHub Actions to create and approve pull
          # requests"), so the API rejects `POST /repos/:o/:r/pulls`
          # with 409 Conflict. Workaround: use a Personal Access
          # Token stored as the `RELEASE_TOKEN` repo secret. The
          # PAT needs `repo` + `workflow` scopes. The PAT is only
          # used by this workflow (no other surface), so the blast
          # radius is small. Rotate the PAT yearly.
          github-token: ${{ secrets.RELEASE_TOKEN }}
          publish: pnpm changeset publish
          version: pnpm version-packages
          commit: "chore: version packages"
          title: "chore: version packages"
          setupGitUser: true
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

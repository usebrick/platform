name: publish

# Publishes `slopbrick` to npm when a GitHub Release is published.
#
# Monorepo note: only `packages/slopbrick` is published. `packages/core`
# is private until the schema stabilizes (see packages/core/README.md).
# `packages/{stackpick,gir,mcp}` (future) will get their own publish
# workflows as they ship.
#
# Auth: OIDC trusted publishing with provenance attestation (npm 2024+
# best practice). To configure: npmjs.com → package settings →
# Trusted publishing → add GitHub Actions publisher for repo
# `usebrick/platform`, workflow `.github/workflows/publish.yml`,
# environment `publish`.
#
# Safety gate: this workflow has TWO human gates per release:
#   (1) publishing the GitHub Release in the UI (the `release:
#       types: [published]` trigger below — no-op without an
#       explicit "Publish release" click), AND
#   (2) approving the deployment in the `publish` environment
#       (the `environment: publish` declaration on the `publish`
#       job — requires `Dystx`'s review; configured in
#       https://github.com/usebrick/platform/settings/environments).
#
# Together: a maintainer publishes a release after reviewing the
# version bump + CHANGELOG, then approves the actual npm publish
# from the GitHub Actions run summary. Two distinct humans can
# each cancel the release (release-undo OR env-approval-deny)
# without the OIDC token having to leak.
#
# Note: the OIDC trusted publisher on npmjs.com (configured to
# accept this workflow for the `publish` environment) is what
# proves the artifacts came from this exact GHA run. There is
# no `NPM_TOKEN` secret stored in the repo, so a compromised
# tag or crafted workflow file alone cannot leak it.
#
# If you want to add a stricter gate (e.g. require 2 reviewers,
# or wait-timer), edit the `publish` environment in repo
# Settings → Environments; the workflow picks it up automatically.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.11.1) — leave empty to use the published release tag'
        required: false

concurrency:
  group: publish-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # for softprops/action-gh-release
  id-token: write   # for npm OIDC trusted publishing (provenance)

jobs:
  publish:
    runs-on: ubuntu-latest
    # The `publish` environment is the second human gate. Configured
    # in https://github.com/usebrick/platform/settings/environments with
    # `required_reviewers: [Dystx]` and `prevent_self_review: false`.
    # Once a release is published in the GH UI, this workflow starts
    # and pauses here waiting for an environment approval; the
    # `Publish slopbrick to npm` step below only runs after Dystx
    # clicks "Approve and deploy" on the run summary. Until that
    # approval lands, the build/test/pack steps still run (so a
    # reviewer can see the dry-run artifact), but no artifact moves.
    # The OIDC `id-token: write` permission above is what the
    # `npm publish --provenance` step uses to authenticate against
    # npmjs.com — trusted-publishing is configured on the npm side
    # to accept this exact workflow + environment.
    environment: publish
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for provenance + release notes

      - name: Install pnpm
        # pnpm version comes from the root package.json's
        # `packageManager` field (pnpm@9.15.0). Don't pin a version
        # here — pnpm/action-setup@v4 errors on the duplicate, and v3
        # silently picks one of the two values.
        uses: pnpm/action-setup@v3

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release tag matches packages/slopbrick version
        # Resolve the release tag from whichever event triggered
        # the run. `release: published` provides
        # `github.event.release.tag_name`; `workflow_dispatch`
        # provides `github.event.inputs.tag` (and `GITHUB_REF`
        # when the dispatch was started from a tag context).
        # Falling back in that order keeps both trigger paths
        # working without duplicating the version-mismatch check.
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            RELEASE_TAG="${{ github.event.release.tag_name }}"
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            RELEASE_TAG="${{ github.event.inputs.tag }}"
          elif [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            RELEASE_TAG="${GITHUB_REF#refs/tags/}"
          else
            echo "::error::Could not derive version from release tag (no release event, no inputs.tag, no refs/tags/v*)"
            echo "::error::Trigger via 'gh release create' (preferred) or pass --input tag=vX.Y.Z to workflow_dispatch."
            exit 1
          fi
          PKG_VERSION="$(node -p "require('./packages/slopbrick/package.json').version")"
          if [ -z "$RELEASE_TAG" ]; then
            echo "::error::Could not derive version from release tag"
            exit 1
          fi
          if [ "$RELEASE_TAG" != "v$PKG_VERSION" ]; then
            # Check if this version is already published to npm.
            # If it is, this is a re-trigger of an existing release
            # (e.g. retry after a transient network failure) and
            # skipping is safe — npm publish is idempotent for the
            # same version. Otherwise, we have a real version mismatch.
            PUBLISHED_VERSION="$(npm view slopbrick version 2>/dev/null || echo '')"
            if [ "v$PUBLISHED_VERSION" = "$RELEASE_TAG" ]; then
              echo "::notice::Release tag $RELEASE_TAG is already published to npm (v$PUBLISHED_VERSION). Skipping — re-trigger detected."
              echo "::notice::If you intended to publish a NEW version, bump packages/slopbrick/package.json to $RELEASE_TAG and re-create the release."
              echo "SKIP_PUBLISH=true" >> "$GITHUB_ENV"
            else
              echo "::error::Release tag $RELEASE_TAG does not match packages/slopbrick version $PKG_VERSION (npm has v${PUBLISHED_VERSION:-none})"
              echo "::error::Bump packages/slopbrick/package.json to $RELEASE_TAG and re-create the release."
              exit 1
            fi
          fi
          echo "Releasing slopbrick v$PKG_VERSION"
          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"

      - name: Verify version is not already published
        run: |
          VERSION="$(node -p "require('./packages/slopbrick/package.json').version")"
          if npm view "slopbrick@$VERSION" version >/dev/null 2>&1; then
            echo "::error::Version $VERSION is already on the npm registry. Re-publishing is not allowed."
            exit 1
          fi

      - name: Build core (workspace dep must be built before engine)
        run: pnpm --filter '@usebrick/core' build

      - name: Build engine (workspace dep must be built before slopbrick)
        run: pnpm --filter '@usebrick/engine' build

      - name: Build slopbrick
        run: pnpm --filter slopbrick build

      - name: Run slopbrick quality gates
        working-directory: packages/slopbrick
        run: |
          pnpm typecheck
          pnpm test

      - name: Pack (dry-run) — sanity check the published artifact
        working-directory: packages/slopbrick
        run: npm pack --dry-run

      - name: Publish slopbrick to npm
        if: env.SKIP_PUBLISH != 'true'
        working-directory: packages/slopbrick
        run: npm publish --provenance --access public

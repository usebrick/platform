name: ci

# CI for the usebrick/platform monorepo.
#
# Runs on PR + push to main. Builds all packages (workspace deps), runs
# typecheck + test on every package, then uploads SARIF for code-scanning
# integration.
#
# Workspace structure (4 packages):
#   packages/core/         @usebrick/core    (private — schema spec, the contract)
#   packages/engine/       @usebrick/engine  (private — pure scanning math)
#   packages/slopbrick/    slopbrick         (published — the CLI, the flagship)
#   packages/website/      @usebrick/website (private — usebrick.dev, Cloudflare Pages)

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Install pnpm
        # pnpm version comes from the root package.json's
        # `packageManager` field (pnpm@9.15.0). Don't pin a version
        # here — pnpm/action-setup@v4 errors on the duplicate, and v3
        # silently picks one of the two values.
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1

      - name: Use Node.js ${{ matrix.node }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        # `pnpm -r build` respects workspace dep order: core first (no
        # workspace deps), then engine (depends on core), then slopbrick
        # (depends on core + engine via prebuild), then website (no
        # workspace deps). This matches the quality gates in AGENTS.md
        # and catches build failures in engine + website that the old
        # filtered form (`core && slopbrick` only) silently skipped.
        # Keep workspace builds serialized: SlopBrick builds nested worker
        # bundles and can otherwise multiply Node RSS on small runners.
        run: pnpm --workspace-concurrency=1 -r build

      - name: Check rule registry is in sync
        # Catches the "added a rule, forgot to regenerate builtins.ts" path
        # with a loud, fast, locally-runnable failure. Run `pnpm generate:rules`
        # locally and commit the result if this step fails.
        run: pnpm --filter slopbrick exec tsx scripts/generate-rule-registry.ts --check

      - name: Check language support matrix is in sync
        run: pnpm --filter slopbrick exec tsx scripts/generate-language-support-matrix.ts --check

      - name: Typecheck all packages
        run: pnpm --workspace-concurrency=1 -r typecheck

      - name: Verify test-host capabilities
        # Do not silently turn socket/file-mode limitations into a green test
        # result. The probe is intentionally before the long recursive suite.
        run: |
          node --test packages/slopbrick/scripts/test-capabilities.test.mjs
          node packages/slopbrick/scripts/test-capabilities.mjs --require-ready

      - name: Test all packages
        # Vitest itself uses the SlopBrick worker budget below; serializing
        # workspace packages prevents four package graphs from co-residing.
        run: pnpm --workspace-concurrency=1 -r test

      - name: Validate JSON schemas against fixtures
        run: pnpm --filter '@usebrick/core' validate:schema

  packed-consumer:
    name: packed consumer (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        # Read the exact version from the repository packageManager field.

      - name: Use Node.js ${{ matrix.node }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package and workspace dependencies
        run: |
          pnpm --filter '@usebrick/core' build
          pnpm --filter '@usebrick/engine' build
          pnpm --filter slopbrick build

      - name: Verify the packed consumer contract
        run: pnpm --filter slopbrick exec vitest run tests/integration/pack-consumer.test.ts --maxWorkers=1 --minWorkers=1 --no-file-parallelism

  security-audit:
    name: production dependency security audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1

      - name: Use Node.js 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run the deterministic adapter test and npm bulk advisory audit
        run: |
          node --test scripts/audit-npm-bulk.test.mjs
          pnpm security:audit

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" aria-label="usebrick">
  <!-- 2x2 brick with mortar joint lines baked in (the horizontal line at y=12 and vertical line at x=12) -->
  <rect x="0"  y="0"  width="11" height="11" rx="1.5" fill="var(--text-accent, #dc4a26)"/>
  <rect x="13" y="0"  width="11" height="11" rx="1.5" fill="var(--text-accent, #dc4a26)" opacity="0.85"/>
  <rect x="0"  y="13" width="11" height="11" rx="1.5" fill="var(--text-accent, #dc4a26)" opacity="0.7"/>
  <rect x="13" y="13" width="11" height="11" rx="1.5" fill="var(--text-accent, #dc4a26)" opacity="0.55"/>
  <!-- U letterform in --text-on-accent so it stays legible on every brick cell -->
  <path d="M7 7v6a5 5 0 0 0 10 0V7" stroke="var(--text-on-accent, #1a0e08)" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>

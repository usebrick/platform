<svg xmlns="http://www.w3.org/2000/svg" width="120" height="40" viewBox="0 0 120 40" aria-hidden="true">
  <defs>
    <pattern id="brick-running-bond" width="120" height="40" patternUnits="userSpaceOnUse">
      <!-- Row 1: full bricks at x=0 and x=62 (so the gap is the mortar joint at x=60) -->
      <rect x="0"  y="2"  width="58" height="18" fill="none" stroke="rgba(220, 74, 38, 0.18)" stroke-width="0.5"/>
      <rect x="62" y="2"  width="58" height="18" fill="none" stroke="rgba(220, 74, 38, 0.18)" stroke-width="0.5"/>
      <!-- Row 2: staggered (half-bond offset) — first brick starts at -30, second at 32, third at 92 -->
      <rect x="-30" y="22" width="58" height="18" fill="none" stroke="rgba(220, 74, 38, 0.18)" stroke-width="0.5"/>
      <rect x="32"  y="22" width="58" height="18" fill="none" stroke="rgba(220, 74, 38, 0.18)" stroke-width="0.5"/>
      <rect x="92"  y="22" width="58" height="18" fill="none" stroke="rgba(220, 74, 38, 0.18)" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="120" height="40" fill="url(#brick-running-bond)"/>
</svg>
